<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net; img-src * data: blob:;">

<title>Markdown Editor</title>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/typo-js@1.2.3/typo.js" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0b10;--surface:#10131b;--surface2:#151925;--surface3:#1c2231;
  --border:#2a3042;--border2:#3a425a;--accent:#8b7cff;--accent2:#c7beff;
  --accent-dim:rgba(139,124,255,0.14);--text:#edf0fb;--text2:#a5aec8;--text3:#64708d;
  --success:#58d39b;--warn:#e7b35e;--danger:#f07a85;
  --mono:'JetBrains Mono',monospace;--serif:'Noto Serif JP',serif;--sans:'Zen Kaku Gothic New',sans-serif;
  --shadow-lg:0 18px 48px rgba(0,0,0,.42);
  --shadow-md:0 10px 28px rgba(0,0,0,.28);
  --glow:0 0 0 1px rgba(199,190,255,.06) inset;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:radial-gradient(circle at top left, rgba(139,124,255,.12), transparent 28%),radial-gradient(circle at top right, rgba(88,211,155,.07), transparent 22%),linear-gradient(180deg, #0b0d14 0%, #090b10 100%);color:var(--text);display:flex;flex-direction:column;position:relative}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg, rgba(255,255,255,.02), transparent 16%, transparent 84%, rgba(255,255,255,.015));mix-blend-mode:screen}
button,input,textarea{font:inherit}

/* MENUBAR */
#menubar{height:28px;background:rgba(14,17,25,.92);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:stretch;padding:0 6px;flex-shrink:0;position:relative;z-index:100;box-shadow:var(--glow)}
.menu-item{position:relative;display:flex;align-items:center}
.menu-trigger{border:none;background:transparent;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;padding:0 10px;cursor:pointer;border-radius:6px;transition:all .12s;height:100%}
.menu-trigger:hover,.menu-trigger.open{background:var(--surface3);color:var(--text)}
.menu-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:240px;background:linear-gradient(180deg, rgba(28,34,49,.98), rgba(20,24,35,.98));backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:6px;box-shadow:var(--shadow-lg), var(--glow);z-index:200}
.menu-dropdown.open{display:block}
.menu-entry{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .1s;gap:16px;user-select:none}
.menu-entry:hover{background:var(--surface3);color:var(--text)}
.menu-entry.active{color:var(--accent2)}
.menu-entry.active .menu-check{opacity:1}
.menu-check{opacity:0;color:var(--accent2);font-size:11px;transition:opacity .1s}
.menu-shortcut{font-family:var(--mono);font-size:11px;color:var(--text3)}
.menu-sep-line{height:1px;background:var(--border);margin:5px 0}

/* TITLEBAR */
#titlebar{height:54px;background:rgba(16,19,27,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:var(--glow)}
.title-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
#app-name{font-size:12px;font-weight:700;color:var(--accent2);letter-spacing:.16em;text-transform:uppercase;font-family:var(--mono);flex-shrink:0;opacity:.9}
#filename-display{font-size:13px;color:var(--text2);font-family:var(--mono);padding:9px 12px;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.08);border-radius:12px;min-width:220px;max-width:540px;width:100%;cursor:text;outline:none;transition:border-color .18s,color .18s,box-shadow .18s,transform .12s;box-shadow:var(--glow)}
#filename-display:focus{border-color:rgba(139,124,255,.5);color:var(--text);box-shadow:0 0 0 4px rgba(139,124,255,.12), var(--glow)}
.title-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.title-btn{border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));color:var(--text2);font-size:12px;font-weight:600;padding:8px 11px;border-radius:11px;cursor:pointer;transition:all .16s;white-space:nowrap;box-shadow:var(--glow)}
.title-btn:hover{background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));color:var(--text);transform:translateY(-1px);box-shadow:var(--shadow-md), var(--glow)}
.title-btn.primary{background:linear-gradient(180deg, rgba(139,124,255,.22), rgba(139,124,255,.12));border-color:rgba(139,124,255,.38);color:var(--accent2)}
.title-btn.active{background:linear-gradient(180deg, rgba(139,124,255,.18), rgba(139,124,255,.1));border-color:rgba(139,124,255,.32);color:var(--accent2)}
.save-state{font-family:var(--mono);font-size:11px;color:var(--success);padding:4px 9px;border:1px solid rgba(88,211,155,.25);border-radius:999px;white-space:nowrap;flex-shrink:0;background:rgba(88,211,155,.05);box-shadow:var(--glow)}
#file-input{display:none}

/* TOOLBAR */
#toolbar{height:46px;background:rgba(15,18,26,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;overflow-x:auto;box-shadow:var(--glow)}
#toolbar::-webkit-scrollbar{height:8px}
#toolbar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
.tool-group{display:flex;align-items:center;gap:2px;padding:4px;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.07);border-radius:12px;flex-shrink:0;box-shadow:var(--glow)}
.tool-btn{border:none;background:transparent;color:var(--text2);font-family:var(--mono);font-size:12px;font-weight:500;padding:6px 9px;border-radius:8px;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.tool-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.tool-btn:active{transform:scale(.97)}
.tool-btn.heading{color:var(--accent2);font-weight:700}
.tool-btn.active-spell{color:var(--warn)!important;background:rgba(232,168,74,.1)}

/* MAIN CONTAINER */
#main-container{position:relative;display:flex;flex:1;overflow:hidden}

/* EDITOR BACKDROP & TEXTAREA */
#editor-wrap {
  flex: 1;
  min-width: 260px;
  position: relative; 
  display: flex;
}

#editor, #editor-backdrop {
  font-family: var(--mono);
  font-size: 14.5px;
  line-height: 1.82;
  padding: 28px 32px;
  tab-size: 2;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  margin: 0;
}

#editor-backdrop {
  position: absolute;
  inset: 0;
  color: transparent; 
  pointer-events: none;
  z-index: 1;
  overflow-y: auto;
  background: transparent;
}

#editor-backdrop mark {
  background: rgba(139, 124, 255, 0.35);
  color: transparent;
  border-radius: 3px;
}

#editor-backdrop mark.active {
  background: rgba(232, 168, 74, 0.65);
  box-shadow: 0 0 0 1px rgba(232, 168, 74, 0.8);
}

#editor {
  position: absolute;
  inset: 0;
  z-index: 2;
  resize: none;
  background: transparent;
  color: var(--text);
  caret-color: var(--accent2);
}
#editor::placeholder { color: var(--text3); }
#editor::selection { background: rgba(124, 106, 247, 0.35); }

#splitter{width:10px;background:transparent;cursor:col-resize;display:none;position:relative;flex-shrink:0}
#splitter::after{content:"";position:absolute;top:50%;left:50%;width:4px;height:54px;transform:translate(-50%,-50%);border-radius:999px;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.18), rgba(255,255,255,.08));box-shadow:0 0 0 1px rgba(255,255,255,.05)}
#splitter:hover::after{background:var(--accent2)}
#main-container.preview-on #splitter{display:block}

/* PREVIEW */
#preview-wrap{width:0;min-width:0;overflow:hidden;background:linear-gradient(180deg, rgba(17,20,29,.86), rgba(12,15,22,.92));transition:width .25s cubic-bezier(.4,0,.2,1);border-left:1px solid rgba(255,255,255,.06);box-shadow:inset 1px 0 0 rgba(255,255,255,.03)}
#preview-wrap.open{width:42%;min-width:320px;border-left-width:0;overflow-y:auto}
#preview{font-family:var(--serif);font-size:15px;line-height:1.95;color:var(--text);padding:40px 46px;max-width:760px}
#preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6{font-family:var(--sans);font-weight:700;margin:1.6em 0 .5em;line-height:1.3;color:var(--text)}
#preview h1{font-size:28px;padding-bottom:.35em;border-bottom:1px solid rgba(255,255,255,.12);letter-spacing:.01em}
#preview h2{font-size:21px;padding-bottom:.25em;border-bottom:1px solid rgba(255,255,255,.08)}
#preview h3{font-size:17px;color:var(--accent2)}
#preview h4{font-size:15px}
#preview p{margin:.7em 0}
#preview ul,#preview ol{margin:.7em 0;padding-left:1.6em}
#preview li{margin:.25em 0}
#preview a{color:var(--accent2);text-decoration:none}
#preview a:hover{text-decoration:underline}
#preview strong{font-weight:700;color:var(--text)}
#preview em{font-style:italic;color:var(--text2)}
#preview code{font-family:var(--mono);font-size:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:1px 6px;color:var(--accent2)}
#preview pre{background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 20px;overflow-x:auto;margin:1em 0;box-shadow:var(--glow)}
#preview pre code{background:none;border:none;padding:0;color:var(--text);font-size:13.5px}
#preview blockquote{border-left:3px solid var(--accent);margin:1.1em 0;padding:8px 16px;color:var(--text2);background:linear-gradient(90deg, rgba(139,124,255,.12), rgba(139,124,255,.04));border-radius:0 10px 10px 0}
#preview hr{border:none;border-top:1px solid var(--border2);margin:1.5em 0}
#preview table{border-collapse:separate;border-spacing:0;width:100%;margin:1em 0;font-family:var(--sans);font-size:14px;overflow:hidden;border-radius:12px;border:1px solid rgba(255,255,255,.08)}
#preview th,#preview td{border-bottom:1px solid rgba(255,255,255,.06);padding:10px 12px}
#preview th{background:rgba(255,255,255,.035);font-weight:500;color:var(--accent2)}
#preview tr:nth-child(even) td{background:rgba(255,255,255,.02)}
#preview img{max-width:100%;border-radius:6px;border:1px solid var(--border)}

/* SEARCH & REPLACE PANEL */
#sr-panel{position:absolute;top:12px;right:18px;width:392px;background:linear-gradient(180deg, rgba(29,34,49,.96), rgba(18,22,31,.96));border:1px solid rgba(255,255,255,.08);border-radius:16px;box-shadow:var(--shadow-lg), var(--glow);z-index:150;display:none;flex-direction:column;font-family:var(--sans);overflow:hidden;backdrop-filter:blur(16px)}
#sr-panel.show{display:flex}
#sr-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.sr-tab{flex:1;background:none;border:none;color:var(--text3);padding:9px 0;font-size:12px;font-weight:700;cursor:pointer;transition:color 0.1s}
.sr-tab:hover{color:var(--text)}
.sr-tab.active{color:var(--accent2);border-bottom:2px solid var(--accent2)}
#sr-close{background:none;border:none;color:var(--text3);padding:0 12px;cursor:pointer;font-size:14px;transition:color 0.1s}
#sr-close:hover{color:var(--text)}
#sr-body{padding:12px}
.sr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sr-input-wrapper{flex:1;position:relative;display:flex;align-items:center}
.sr-input{width:100%;height:36px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 10px;border-radius:8px;outline:none}
.sr-input:focus{border-color:var(--accent)}
.sr-count{font-size:11px;color:var(--text3);font-family:var(--mono);position:absolute;right:10px;pointer-events:none}
.sr-nav-btn{height:36px;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:8px;cursor:pointer;padding:4px 10px;font-size:12px;transition:all 0.1s}
.sr-nav-btn:hover{background:var(--border);color:var(--text)}
.sr-options{display:flex;gap:12px;font-size:11px;color:var(--text2);margin-bottom:8px;user-select:none;flex-wrap:wrap}
.sr-options label{display:flex;align-items:center;gap:4px;cursor:pointer}
.sr-options input[type="checkbox"]{accent-color:var(--accent)}
.sr-error-msg{color:var(--danger);font-size:11px;margin-bottom:8px;display:none}
.sr-action-btn{height:36px;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:8px;cursor:pointer;padding:6px 12px;font-size:12px;font-weight:500;flex:1;transition:all 0.1s}
.sr-action-btn:hover{background:var(--border);color:var(--text)}
#sr-replace-area{display:none}

/* STATUS BAR */
#statusbar{height:26px;background:rgba(14,17,24,.88);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 12px;gap:14px;flex-shrink:0;box-shadow:var(--glow)}
.stat-item{font-family:var(--mono);font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:5px}
.stat-label{color:var(--text3)}
.stat-val{color:var(--text2);font-weight:500}
.stat-item.accent .stat-val{color:var(--accent2)}
#spell-status{font-family:var(--mono);font-size:10.5px;color:var(--text3);margin-left:auto}
#spell-status.on{color:var(--warn)}

/* TOAST */
#toast{position:fixed;bottom:38px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(180deg, rgba(30,35,48,.96), rgba(21,25,35,.96));border:1px solid rgba(255,255,255,.08);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 18px;border-radius:12px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:var(--shadow-lg), var(--glow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SPELL PANEL */
#spell-panel{position:fixed;bottom:36px;right:20px;width:320px;background:linear-gradient(180deg, rgba(29,34,49,.97), rgba(18,22,31,.97));border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:0;z-index:300;display:none;box-shadow:var(--shadow-lg), var(--glow);overflow:hidden;backdrop-filter:blur(16px)}
#spell-panel.show{display:block}
#sph{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 9px;border-bottom:1px solid var(--border)}
#sph h3{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono)}
#spell-close{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;border-radius:3px;transition:color .1s}
#spell-close:hover{color:var(--text)}
#spell-loading{padding:14px 12px;font-family:var(--mono);font-size:12px;color:var(--text3);display:none;align-items:center;gap:8px}
#spell-loading.show{display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-icon{width:12px;height:12px;border:1.5px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
#spell-list{max-height:260px;overflow-y:auto;padding:4px}
#spell-empty{font-size:13px;color:var(--success);padding:12px;display:none}
.spell-word{padding:6px 8px;border-radius:6px;margin-bottom:2px}
.spell-word:hover{background:var(--surface3)}
.spell-word-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
.spell-word-text{font-family:var(--mono);font-size:13px;color:var(--danger);flex:1}
.spell-actions{display:flex;gap:4px;flex-shrink:0}
.spell-btn{font-size:10px;color:var(--text3);padding:2px 7px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;font-family:var(--sans);transition:all .1s;white-space:nowrap}
.spell-btn:hover{color:var(--text2);border-color:var(--border2);background:var(--surface3)}
.spell-btn.add{color:var(--accent2);border-color:rgba(124,106,247,.3)}
.spell-btn.add:hover{background:var(--accent-dim)}
.spell-suggestions{display:flex;flex-wrap:wrap;gap:4px}
.spell-sug{font-size:11px;font-family:var(--mono);color:var(--text2);padding:2px 7px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .1s}
.spell-sug:hover{color:var(--accent2);border-color:rgba(124,106,247,.4);background:var(--accent-dim)}
#spell-footer{font-family:var(--mono);font-size:11px;color:var(--text3);padding:7px 12px;border-top:1px solid var(--border);display:none}
#spell-footer span{color:var(--danger);font-weight:500}

/* RESPONSIVE */
@media (max-width: 980px){
  #titlebar{padding:0 10px;gap:8px}
  #filename-display{min-width:140px;max-width:none}
  .title-actions{gap:6px}
  .title-btn{padding:6px 8px;font-size:11px}
  #sr-panel{right:10px;left:10px;width:auto}
  #preview{padding:24px}
}

@media (max-width: 760px){
  #app-name{display:none}
  .save-state{display:none}
  #toolbar{height:42px}
  #preview-wrap.open{width:100%!important;min-width:0}
  #main-container.preview-on #splitter{display:none}
}

/* PDF PRINT STYLES */
@media print {
  #menubar, #titlebar, #toolbar, #statusbar, #editor-wrap, #splitter, #spell-panel, #toast, #sr-panel { display: none !important; }
  body { background: white !important; }
  #main-container { display: block !important; overflow: visible !important; height: auto !important; }
  #preview-wrap { width: 100% !important; max-width: none !important; display: block !important; border: none !important; overflow: visible !important; background: white !important; }
  #preview { max-width: none !important; padding: 0 !important; color: black !important; }
  #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6,
  #preview p, #preview li, #preview strong { color: black !important; }
  #preview em { color: #333 !important; }
  #preview code { border: 1px solid #ccc !important; color: black !important; background: transparent !important; }
  #preview pre { border: 1px solid #ccc !important; background: transparent !important; page-break-inside: avoid; }
  #preview blockquote { border-left-color: #999 !important; background: transparent !important; color: #444 !important; }
  #preview table { width: 100% !important; border-collapse: collapse !important; }
  #preview th { background: #f0f0f0 !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  h1, h2, h3 { page-break-after: avoid; }
  img { max-width: 100% !important; page-break-inside: avoid; }
}
</style>
</head>
<body>

<div id="menubar">
  <div class="menu-item">
    <button class="menu-trigger" data-menu="file" id="t-file"></button>
    <div class="menu-dropdown" id="dd-file">
      <div class="menu-entry" onclick="newFile()">
        <span id="m-new"></span><span class="menu-shortcut">Ctrl+N</span>
      </div>
      <div class="menu-entry" onclick="handleOpen()">
        <span id="m-open"></span><span class="menu-shortcut">Ctrl+O</span>
      </div>
      <div class="menu-sep-line"></div>
      <div class="menu-entry" onclick="handleSave(false)">
        <span id="m-save"></span><span class="menu-shortcut">Ctrl+S</span>
      </div>
      <div class="menu-entry" id="menu-save-as" onclick="handleSave(true)">
        <span id="m-save-as"></span><span class="menu-shortcut">Ctrl+Shift+S</span>
      </div>
      <div class="menu-sep-line"></div>
      <div class="menu-entry" onclick="exportHtml()">
        <span id="m-export-html"></span>
      </div>
      <div class="menu-entry" onclick="exportPdf()">
        <span id="m-export-pdf"></span>
      </div>
    </div>
  </div>
  <div class="menu-item">
    <button class="menu-trigger" data-menu="edit" id="t-edit"></button>
    <div class="menu-dropdown" id="dd-edit">
      <div class="menu-entry" onclick="openSearchPanel('find')">
        <span id="m-find"></span><span class="menu-shortcut">Ctrl+F</span>
      </div>
      <div class="menu-entry" onclick="openSearchPanel('replace')">
        <span id="m-replace"></span><span class="menu-shortcut">Ctrl+H</span>

<script>
/* ── Environment Detection ── */
// iPadOSを確実にモバイル(タブレット)として判定
const isIPadOS = (navigator.platform === 'MacIntel' || /Macintosh/i.test(navigator.userAgent)) && navigator.maxTouchPoints > 1;
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || isIPadOS || (navigator.maxTouchPoints > 0 && window.innerWidth <= 1024);

/* ── i18n ── */
const isJa = (navigator.language || navigator.languages?.[0] || '').startsWith('ja');
document.documentElement.lang = isJa ? 'ja' : 'en';

const T = {
  menuFile:    isJa ? 'ファイル' : 'File',

  promptSaveAs:isJa ? '新しいファイル名を入力してください:' : 'Enter new file name:',
  restorePrompt:isJa ? '前回の未保存データが見つかりました。復元しますか？\n(キャンセルすると破棄されます)' : 'Found unsaved changes from your last session. Restore them?\n(Cancel to discard)',

  findMenu:    isJa ? '検索' : 'Find',
  replaceMenu: isJa ? '置換' : 'Replace',
  findTab:     isJa ? '検索' : 'Find',
  replaceTab:  isJa ? '置換' : 'Replace',
  findHolder:  isJa ? '検索する文字列' : 'Find',
  replaceHolder:isJa ? '置換後の文字列' : 'Replace with',
  regexLbl:    isJa ? '正規表現' : 'RegExp',
  caseLbl:     isJa ? '大文字小文字を区別' : 'Case Sensitive',
  wordLbl:     isJa ? '単語単位' : 'Whole Word',
  replaceBtn:  isJa ? '置換' : 'Replace',
  replaceAllBtn:isJa ? 'すべて置換' : 'Replace All',
  noMatches:   isJa ? '一致なし' : 'No matches',
  nMatches:    isJa ? n => `${n} 件` : n => `${n} matches`,
  invalidRegex:isJa ? '正規表現が正しくありません' : 'Invalid regular expression',
  confirmRepAll:isJa ? n => `${n} 箇所すべて置換しますか？` : n => `Replace all ${n} occurrences?`,
  replacedN:   isJa ? n => `${n} 箇所を置換しました` : n => `Replaced ${n} occurrences`,

  preview:     isJa ? 'Preview' : 'Preview',
  spellCheck:  isJa ? 'Spell (EN)' : 'Spell (EN)',
  bold:        isJa ? '太字'     : 'Bold',
  italic:      isJa ? '斜体'     : 'Italic',
  tbList:      isJa ? 'リスト'   : 'List',
  tbOList:     isJa ? '番号'     : 'Numbered',
  tbTask:      isJa ? 'タスク'   : 'Task',
  tbQuote:     isJa ? '引用'     : 'Quote',
  tbCode:      isJa ? 'コード'   : 'Code',
  tbLink:      isJa ? 'リンク'   : 'Link',
  tbTable:     isJa ? '表'       : 'Table',
  tbHr:        isJa ? '区切り'   : 'Rule',
  spellBtn:    isJa ? 'Spell (EN)' : 'Spell (EN)',
  spellOn:     isJa ? 'Spell ON' : 'Spell ON',
  spellPanelTitle: isJa ? 'スペル候補' : 'Possible misspellings',
  spellOk:     isJa ? 'スペルミスは見つかりませんでした ✓' : 'No misspellings found ✓',
  spellIgnore: isJa ? '無視' : 'Ignore',
  spellAdd:    isJa ? '辞書に追加' : 'Add to dict',
  spellCount:  isJa ? n => `${n} 件の候補` : n => `${n} issue${n!==1?'s':''} found`,
  dictLoading: isJa ? '辞書を読み込み中…' : 'Dict loading…',
  dictReady:   isJa ? '辞書読み込み完了' : 'Dict ready',
  dictFailed:  isJa ? '辞書の読み込み失敗' : 'Dict failed',
  loadingDict: isJa ? '辞書を読み込んでいます…' : 'Loading dictionary…',
  checking:    isJa ? 'チェック中…' : 'Checking…',
  saved:       isJa ? 'Saved' : 'Saved',
  downloaded:  isJa ? 'ダウンロードしました' : 'Downloaded',
  unsaved:     isJa ? 'Unsaved' : 'Unsaved',
  opened:      isJa ? f => `「${f}」を開きました` : f => `Opened "${f}"`,
  shared:      isJa ? '共有しました' : 'Shared successfully',
  sLines:      isJa ? '行'   : 'Lines',
  sWords:      isJa ? '単語' : 'Words',
  sChars:      isJa ? '文字' : 'Chars',
  insertLink:  isJa ? 'リンクテキスト' : 'Link Text',
  tableSnippet: isJa
    ? '\n| 列1 | 列2 | 列3 |\n|------|------|------|\n| データ | データ | データ |\n'
    : '\n| Col1 | Col2 | Col3 |\n|------|------|------|\n| data | data | data |\n',
  placeholder: isJa
    ? '# タイトル\n\nここにマークダウンを入力してください。'
    : '# Title\n\nStart writing Markdown here.',
  defaultMd: isJa
    ? `# Markdown エディタ\n\nこの版は、**ブラウザ最適化UI** と **BOM無しUTF-8・NFC正規化** を備えた最終バージョンです。\n\n## 主な機能\n\n- **文字コード**: 保存時は常に綺麗な「BOM無し UTF-8」に自動変換。\n- **NFC正規化**: Mac等からの濁点ペーストによる検索バグを自動防止。\n- **ブラウザ判別UI**: Firefox等では「ダウンロード」、Chromeでは「保存」にメニューが自動変化。\n- **スマホ/タブレット**: 「Share (共有)」機能でのファイル受け渡し。\n- **共通**: ブラウザ内での入力自動保存 (Auto-save)。\n\n---\n\n*そのまま編集を開始してください。*\n`
    : `# Markdown Editor\n\nThis is the final version featuring **Browser-Optimized UI** and **BOM-less UTF-8 / NFC Normalization**.\n\n## Key Features\n\n- **Encoding**: Files are cleanly exported as BOM-less UTF-8.\n- **NFC Normalization**: Auto-fixes search bugs from decomposed characters pasted from macOS.\n- **Adaptive UI**: Menus switch to "Download" on Firefox/Safari, and "Save" on Chrome/Edge.\n- **Mobile**: Native file sharing (Web Share API).\n- **Universal**: Local browser Auto-save.\n\n---\n\n*Start editing!*\n`,
};

const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
set('t-file', T.menuFile); set('t-view', T.menuView); set('t-edit', T.menuEdit);
set('m-new', T.newFile);
set('m-open', T.open);
set('m-find', T.findMenu); set('m-replace', T.replaceMenu);
set('m-export-html', T.exportHtml); set('m-export-pdf', T.exportPdf);
set('m-preview-label', T.preview); set('m-spell-label', T.spellCheck);
set('m-bold', T.bold); set('m-italic', T.italic);
set('tb-list-btn', '─ ' + T.tbList); set('tb-olist-btn', '1. ' + T.tbOList);
set('tb-task', T.tbTask); set('tb-quote', T.tbQuote); set('tb-code', T.tbCode);
set('tb-link', T.tbLink); set('tb-table', T.tbTable); set('tb-hr', T.tbHr);
set('s-label-lines', T.sLines); set('s-label-words', T.sWords); set('s-label-chars', T.sChars);
set('sp-title', T.spellPanelTitle); set('spell-empty', T.spellOk);
set('spell-toggle-btn', T.spellBtn); set('tab-find', T.findTab); set('tab-replace', T.replaceTab);
set('sr-lbl-regex', T.regexLbl); set('sr-lbl-case', T.caseLbl); set('sr-lbl-word', T.wordLbl);
set('sr-btn-replace', T.replaceBtn); set('sr-btn-replace-all', T.replaceAllBtn); set('sr-error', T.invalidRegex);
set('open-btn', T.open); set('preview-toggle-btn', T.preview); set('spell-toggle-title-btn', T.spellCheck);
document.getElementById('sr-search-input').placeholder = T.findHolder;
document.getElementById('sr-replace-input').placeholder = T.replaceHolder;

/* ── Dynamic UI based on Device and API support ── */
if (isMobile) {
  // 1. スマホ・タブレットの場合 = 「共有 (Share)」
  set('save-btn', T.share);
  set('m-save', T.share);
  document.getElementById('menu-save-as').style.display = 'none';
} else if (!window.showSaveFilePicker) {
  // 2. PCだが上書き保存APIがない場合(Firefox, Safariなど) = 「ダウンロード」
  set('save-btn', T.download);
  set('m-save', T.download);
  set('m-save-as', T.downloadAs);
} else {
  // 3. PCで上書き保存APIがある場合(Chrome, Edgeなど) = 「保存」
  set('save-btn', T.save);
  set('m-save', T.save);
  set('m-save-as', T.saveAs);
}

/* ── Core refs ── */
const editor = document.getElementById('editor');
const backdrop = document.getElementById('editor-backdrop');
const preview = document.getElementById('preview');
const previewWrap = document.getElementById('preview-wrap');
const filenameInput = document.getElementById('filename-display');
const mainContainer = document.getElementById('main-container');
const splitter = document.getElementById('splitter');
const inlineSaveState = document.getElementById('inline-save-state');

let previewOpen = false;
let spellEnabled = false;
let customDict = new Set();
let ignoredWords = new Set();
let isDirty = false;
let isDraggingSplitter = false;

editor.placeholder = T.placeholder;
editor.value = T.defaultMd;

if (window.marked) marked.use({ gfm: true, breaks: true });
const segmenter = typeof Intl.Segmenter !== 'undefined'
  ? new Intl.Segmenter('ja', { granularity: 'word' }) : null;

/* ── Auto-save Logic ── */
const AUTOSAVE_TXT_KEY = 'md_editor_draft_text';
const AUTOSAVE_NAME_KEY = 'md_editor_draft_name';

function triggerAutoSave() {
  localStorage.setItem(AUTOSAVE_TXT_KEY, editor.value);
  localStorage.setItem(AUTOSAVE_NAME_KEY, filenameInput.value);
}

function loadAutoSave() {
  const savedTxt = localStorage.getItem(AUTOSAVE_TXT_KEY);
  const savedName = localStorage.getItem(AUTOSAVE_NAME_KEY);
  if (savedTxt && savedTxt !== T.defaultMd && savedTxt !== '') {
    if (confirm(T.restorePrompt)) {
      editor.value = savedTxt;
      if (savedName) filenameInput.value = savedName;
      markDirty();
    } else {
      localStorage.removeItem(AUTOSAVE_TXT_KEY);
      localStorage.removeItem(AUTOSAVE_NAME_KEY);
    }
  }
}

// Initial Boot
document.addEventListener('DOMContentLoaded', () => {
  loadAutoSave();
  update();
  if (!isDirty) markSaved();
});

/* ════════════════════════════════════════
   HUNSPELL via Typo.js
════════════════════════════════════════ */
let typo = null;
let dictReady = false;
const DICT_BASE = 'https://cdn.jsdelivr.net/npm/typo-js@1.2.3/dictionaries/en_US/en_US';

async function loadDictionary() {
  try {
    const [affRes, dicRes] = await Promise.all([
      fetch(DICT_BASE + '.aff'), fetch(DICT_BASE + '.dic')
    ]);
    if (!affRes.ok || !dicRes.ok) throw new Error('HTTP error');
    const [aff, dic] = await Promise.all([affRes.text(), dicRes.text()]);
    typo = new Typo('en_US', aff, dic, { platform: 'any' });
    dictReady = true;
    if (spellEnabled) runSpellCheck();
  } catch (err) {
    console.warn('Dictionary load failed:', err);
  }
}
if (window.Typo) loadDictionary();

/* ════════════════════════════════════════
   MENU & UI
════════════════════════════════════════ */
document.querySelectorAll('.menu-trigger').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('dd-' + btn.dataset.menu);
    const wasOpen = dd.classList.contains('open');
    closeMenus();
    if (!wasOpen) { dd.classList.add('open'); btn.classList.add('open'); }
  });
});
document.addEventListener('click', closeMenus);
function closeMenus() {
  document.querySelectorAll('.menu-dropdown').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.menu-trigger').forEach(b => b.classList.remove('open'));
}

function togglePreview() {
  previewOpen = !previewOpen;
  previewWrap.classList.toggle('open', previewOpen);
  mainContainer.classList.toggle('preview-on', previewOpen);
  document.getElementById('preview-check').style.opacity = previewOpen ? '1' : '0';
  document.getElementById('m-preview-entry').classList.toggle('active', previewOpen);
  document.getElementById('preview-toggle-btn').classList.toggle('active', previewOpen);
  if (!previewOpen) previewWrap.style.width = '';
  if (previewOpen) renderPreview();
  closeMenus();
}

function renderPreview() {
  if (!previewOpen || !window.marked) return;
  const raw = marked.parse(editor.value);
  if (window.DOMPurify) {
    preview.innerHTML = DOMPurify.sanitize(raw);
  } else {
    preview.innerHTML = `<div style="color:var(--danger); border: 1px solid var(--danger); padding: 15px; border-radius: 8px; font-family: var(--sans); background: rgba(240,112,112,0.1); margin: 20px;"><b>Security Error:</b><br>Preview disabled because DOMPurify failed to load.</div>`;
  }
}

splitter.addEventListener('mousedown', () => {
  if (!previewOpen) return;
  isDraggingSplitter = true;
  document.body.style.cursor = 'col-resize';
});
window.addEventListener('mousemove', (e) => {
  if (!isDraggingSplitter || !previewOpen) return;
  const rect = mainContainer.getBoundingClientRect();
  const rightWidth = rect.right - e.clientX;
  const minWidth = Math.min(320, rect.width - 220);
  const maxWidth = rect.width * 0.72;
  const nextWidth = Math.max(minWidth, Math.min(rightWidth, maxWidth));
  previewWrap.style.width = `${nextWidth}px`;
});
window.addEventListener('mouseup', () => {
  isDraggingSplitter = false;
  document.body.style.cursor = '';
});

/* ════════════════════════════════════════
   SAVE STATE / STATS
════════════════════════════════════════ */
function markDirty() {
  isDirty = true;
  inlineSaveState.textContent = T.unsaved;
  inlineSaveState.style.color = 'var(--warn)';
  inlineSaveState.style.borderColor = 'rgba(232,168,74,.25)';
}

function markSaved() {
  isDirty = false;
  inlineSaveState.textContent = T.saved;
  inlineSaveState.style.color = 'var(--success)';
  inlineSaveState.style.borderColor = 'rgba(78,203,143,.28)';
}

function update() {
  renderPreview();
  const text = editor.value;
  const lines = text.length === 0 ? 1 : text.split('\n').length;
  let words = 0;
  if (segmenter) { for (const s of segmenter.segment(text)) { if (s.isWordLike) words++; } }
  else words = text.trim() ? text.trim().split(/\s+/).length : 0;
  set('s-lines', lines); set('s-words', words); set('s-chars', text.replace(/[\n\r]/g, '').length);
}

editor.addEventListener('scroll', () => {
  backdrop.scrollTop = editor.scrollTop;
  backdrop.scrollLeft = editor.scrollLeft;
});

let autoSaveTimeout;
editor.addEventListener('input', () => {
  update();
  markDirty();
  if (spellEnabled) runSpellCheck();
  if (srPanelOpen) performSearch(false);
  
  // Debounced Auto-save
  clearTimeout(autoSaveTimeout);
  autoSaveTimeout = setTimeout(triggerAutoSave, 1000);
});

// 【NFC正規化】ペースト時の分離濁点バグ防止
editor.addEventListener('paste', e => {
  e.preventDefault();
  // クリップボードのテキストを取得し、瞬時にNFCで正規化
  const text = (e.clipboardData || window.clipboardData).getData('text').normalize('NFC');
  // Undo履歴に残るように挿入
  document.execCommand('insertText', false, text);
  markDirty();
  triggerAutoSave();
});

/* ════════════════════════════════════════
   SEARCH & REPLACE
════════════════════════════════════════ */
const srPanel = document.getElementById('sr-panel');
const srInput = document.getElementById('sr-search-input');
const srReplaceInput = document.getElementById('sr-replace-input');
const srCount = document.getElementById('sr-count');
const srError = document.getElementById('sr-error');

let srPanelOpen = false;
let srMode = 'find';
let srMatches = [];
let srCurrentIdx = -1;
let isComposing = false;

srInput.addEventListener('compositionstart', () => { isComposing = true; });
srInput.addEventListener('compositionend', () => { isComposing = false; performSearch(true); });
srReplaceInput.addEventListener('compositionstart', () => { isComposing = true; });
srReplaceInput.addEventListener('compositionend', () => { isComposing = false; });

function openSearchPanel(mode) {
  closeMenus();
  srPanelOpen = true;
  srMode = mode;
  srPanel.classList.add('show');

  if (mode === 'find') {
    document.getElementById('tab-find').classList.add('active');
    document.getElementById('tab-replace').classList.remove('active');
    document.getElementById('sr-replace-area').style.display = 'none';
  } else {
    document.getElementById('tab-replace').classList.add('active');
    document.getElementById('tab-find').classList.remove('active');
    document.getElementById('sr-replace-area').style.display = 'block';
  }

  const selText = editor.value.slice(editor.selectionStart, editor.selectionEnd);
  if (selText && !selText.includes('\n')) srInput.value = selText;

  srInput.focus();
  srInput.select();
  performSearch(true);
}

function closeSearchPanel() {
  srPanelOpen = false;
  srPanel.classList.remove('show');
  backdrop.innerHTML = '';
  editor.focus();
}

document.getElementById('tab-find').onclick = () => openSearchPanel('find');
document.getElementById('tab-replace').onclick = () => openSearchPanel('replace');
document.getElementById('sr-close').onclick = closeSearchPanel;

function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function buildRegex(isGlobal = true) {
  const query = srInput.value;
  if (!query) return null;
  const useRegex = document.getElementById('sr-opt-regex').checked;
  const matchCase = document.getElementById('sr-opt-case').checked;
  const wholeWord = document.getElementById('sr-opt-word').checked;
  let patternStr = useRegex ? query : escapeRegExp(query);
  if (wholeWord) patternStr = `\\b${patternStr}\\b`;
  let flags = 'm';
  if (isGlobal) flags += 'g';
  if (!matchCase) flags += 'i';
  try { return new RegExp(patternStr, flags); } catch (e) { return null; }
}

function setSearchCount() {
  if (srMatches.length === 0 || srCurrentIdx === -1) { srCount.textContent = T.noMatches; return; }
  srCount.textContent = `${srCurrentIdx + 1} / ${srMatches.length}`;
}

function updateBackdrop() {
  if (!srPanelOpen || srMatches.length === 0) { backdrop.innerHTML = ''; return; }
  const text = editor.value;
  let html = '';
  let lastIdx = 0;
  const esc = t => t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  srMatches.forEach((m, i) => {
    html += esc(text.slice(lastIdx, m.start));
    const className = (i === srCurrentIdx) ? 'active' : '';
    html += `<mark class="${className}">${esc(m.text)}</mark>`;
    lastIdx = m.end;
  });
  html += esc(text.slice(lastIdx));
  if (text.endsWith('\n')) html += '<br>';
  backdrop.innerHTML = html;
}

function performSearch(jumpToClosest = false) {
  srMatches = [];
  srError.style.display = 'none';
  const query = srInput.value;

  if (!query) { srCount.textContent = ''; srCurrentIdx = -1; updateBackdrop(); return; }

  const regex = buildRegex(true);
  if (!regex) { srError.style.display = 'block'; srCount.textContent = ''; srCurrentIdx = -1; updateBackdrop(); return; }

  const text = editor.value;
  let match;
  while ((match = regex.exec(text)) !== null) {
    if (match.index === regex.lastIndex) regex.lastIndex++;
    srMatches.push({ start: match.index, end: match.index + match[0].length, text: match[0] });
  }

  if (srMatches.length === 0) { srCurrentIdx = -1; srCount.textContent = T.noMatches; updateBackdrop(); return; }

  if (jumpToClosest) {
    const cursorPos = editor.selectionStart;
    srCurrentIdx = srMatches.findIndex(m => m.start >= cursorPos);
    if (srCurrentIdx === -1) srCurrentIdx = 0;
    highlightCurrentMatch();
  } else {
    if (srCurrentIdx >= srMatches.length) srCurrentIdx = srMatches.length - 1;
    else if (srCurrentIdx === -1) srCurrentIdx = 0;
    setSearchCount();
    updateBackdrop();
  }
}

function highlightCurrentMatch() {
  if (srMatches.length === 0 || srCurrentIdx === -1) { updateBackdrop(); return; }
  const m = srMatches[srCurrentIdx];
  if (isComposing) { setSearchCount(); updateBackdrop(); return; }

  const activeEl = document.activeElement; 
  editor.focus();
  editor.setSelectionRange(m.start, m.end);
  if (activeEl && activeEl.closest('#sr-panel')) activeEl.focus();
  setSearchCount();
  updateBackdrop(); 
}

function navMatch(dir) {
  if (srMatches.length === 0) return;
  srCurrentIdx += dir;
  if (srCurrentIdx >= srMatches.length) srCurrentIdx = 0;
  if (srCurrentIdx < 0) srCurrentIdx = srMatches.length - 1;
  highlightCurrentMatch();
}

document.getElementById('sr-next').onclick = () => navMatch(1);
document.getElementById('sr-prev').onclick = () => navMatch(-1);

[srInput, document.getElementById('sr-opt-regex'), document.getElementById('sr-opt-case'), document.getElementById('sr-opt-word')].forEach(el => {
  el.addEventListener('input', () => performSearch(true));
  el.addEventListener('change', () => performSearch(true));
});

srPanel.addEventListener('keydown', e => {
  if (e.isComposing) return;
  if (e.key === 'Escape') { e.preventDefault(); closeSearchPanel(); }
  if (e.key === 'Enter') { e.preventDefault(); navMatch(e.shiftKey ? -1 : 1); }
});

document.getElementById('sr-btn-replace').onclick = () => {
  if (srMatches.length === 0 || srCurrentIdx === -1) return;
  const m = srMatches[srCurrentIdx];
  if (editor.selectionStart !== m.start || editor.selectionEnd !== m.end) { highlightCurrentMatch(); return; }
  const regex = buildRegex(false);
  if (!regex) return;
  const repStr = srReplaceInput.value;
  const newSubText = m.text.replace(regex, repStr);
  editor.focus();
  document.execCommand('insertText', false, newSubText);
  markDirty();
  performSearch(true);
};

document.getElementById('sr-btn-replace-all').onclick = () => {
  if (srMatches.length === 0) return;
  const count = srMatches.length;
  if (!confirm(T.confirmRepAll(count))) return;
  const regex = buildRegex(true);
  if (!regex) return;
  const repStr = srReplaceInput.value;
  const oldFullText = editor.value;
  const newFullText = oldFullText.replace(regex, repStr);
  const scrollTop = editor.scrollTop;
  editor.focus();
  editor.setSelectionRange(0, oldFullText.length);
  document.execCommand('insertText', false, newFullText);
  editor.setSelectionRange(0, 0);
  editor.scrollTop = scrollTop;
  markDirty();
  toast(T.replacedN(count));
  performSearch(true);
};

/* ════════════════════════════════════════
   SPELL CHECK
════════════════════════════════════════ */
function toggleSpell() {
  spellEnabled = !spellEnabled;
  const btn = document.getElementById('spell-toggle-btn');
  const titleBtn = document.getElementById('spell-toggle-title-btn');
  const entry = document.getElementById('m-spell-entry');
  const chk = document.getElementById('spell-check');
  const status = document.getElementById('spell-status');
  btn.classList.toggle('active-spell', spellEnabled);
  titleBtn.classList.toggle('active', spellEnabled);
  entry.classList.toggle('active', spellEnabled);
  chk.style.opacity = spellEnabled ? '1' : '0';
  if (spellEnabled) {
    status.textContent = T.spellOn;
    status.classList.add('on');
    runSpellCheck();
  } else {
    status.textContent = '';
    status.classList.remove('on');
    closeSpellPanel();
  }
  closeMenus();
}

function closeSpellPanel() { document.getElementById('spell-panel').classList.remove('show'); }

let spellTimer = null;
function runSpellCheck() {
  if (!spellEnabled) return;
  clearTimeout(spellTimer);
  spellTimer = setTimeout(doSpellCheck, 350);
}

function stripMarkdown(src) {
  return src.replace(/```[\s\S]*?```/g, '').replace(/`[^`\n]+`/g, '').replace(/!\[[^\]]*\]\([^)]*\)/g, '').replace(/\[([^\]]*)\]\([^)]*\)/g, '$1').replace(/^#{1,6}\s+/gm, '').replace(/^[-*+]\s+/gm, '').replace(/^\d+\.\s+/gm, '').replace(/^>\s*/gm, '').replace(/[*_~|\\]/g, ' ');
}

function doSpellCheck() {
  if (!spellEnabled) return;
  const panel = document.getElementById('spell-panel'), list = document.getElementById('spell-list'), empty = document.getElementById('spell-empty'), loading = document.getElementById('spell-loading'), footer = document.getElementById('spell-footer');
  panel.classList.add('show'); list.innerHTML = ''; empty.style.display = 'none'; footer.style.display = 'none';
  if (!dictReady || !typo) { loading.classList.add('show'); set('sp-loading-text', T.loadingDict); return; }
  loading.classList.add('show'); set('sp-loading-text', T.checking);

  setTimeout(() => {
    const stripped = stripMarkdown(editor.value);
    const wordRe = /\b([a-zA-Z]{2,}(?:'[a-zA-Z]+)?)\b/g;
    const seen = new Set(), errors = [];
    let m;
    while ((m = wordRe.exec(stripped)) !== null) {
      const raw = m[1], lower = raw.toLowerCase();
      if (seen.has(lower)) continue;
      seen.add(lower);
      if (ignoredWords.has(lower) || customDict.has(lower)) continue;
      if (/[A-Z]/.test(raw.slice(1))) continue;
      if (/\d/.test(raw)) continue;
      const ok = typo.check(raw) || typo.check(raw.charAt(0).toUpperCase() + raw.slice(1));
      if (!ok) { const sugs = typo.suggest(raw).slice(0, 5); errors.push({ word: raw, lower, sugs }); }
    }
    loading.classList.remove('show'); list.innerHTML = '';
    if (errors.length === 0) { empty.style.display = 'block'; } else {
      errors.forEach(({ word, lower, sugs }) => {
        const row = document.createElement('div'); row.className = 'spell-word'; row.id = 'sw-' + lower;
        const topRow = document.createElement('div'); topRow.className = 'spell-word-row';
        const wordSpan = document.createElement('span'); wordSpan.className = 'spell-word-text'; wordSpan.textContent = word;
        const actions = document.createElement('div'); actions.className = 'spell-actions';
        const ignBtn = document.createElement('button'); ignBtn.className = 'spell-btn'; ignBtn.textContent = T.spellIgnore;
        ignBtn.onclick = () => { ignoredWords.add(lower); removeSpellRow(lower); };
        const addBtn = document.createElement('button'); addBtn.className = 'spell-btn add'; addBtn.textContent = T.spellAdd;
        addBtn.onclick = () => { customDict.add(lower); removeSpellRow(lower); };
        actions.append(ignBtn, addBtn); topRow.append(wordSpan, actions); row.appendChild(topRow);
        if (sugs.length > 0) {
          const sugDiv = document.createElement('div'); sugDiv.className = 'spell-suggestions';
          sugs.forEach(sug => {
            const s = document.createElement('span'); s.className = 'spell-sug'; s.textContent = sug;
            s.onclick = () => replaceWord(word, sug); sugDiv.appendChild(s);
          });
          row.appendChild(sugDiv);
        }
        list.appendChild(row);
      });
      footer.innerHTML = T.spellCount(errors.length).replace(/\d+/, n => `<span>${n}</span>`); footer.style.display = 'block';
    }
  }, 0);
}

function removeSpellRow(lower) {
  const el = document.getElementById('sw-' + lower); if (el) el.remove();
  if (document.getElementById('spell-list').children.length === 0) {
    document.getElementById('spell-empty').style.display = 'block';
    document.getElementById('spell-footer').style.display = 'none';
  }
}

function replaceWord(original, replacement) {
  const val = editor.value, esc = original.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), re = new RegExp('\\b' + esc + '\\b', 'i'), m = re.exec(val);
  if (!m) return;
  const rep = m[0][0] === m[0][0].toUpperCase() && m[0][0] !== m[0][0].toLowerCase() ? replacement.charAt(0).toUpperCase() + replacement.slice(1) : replacement;
  editor.setSelectionRange(m.index, m.index + m[0].length); editor.focus(); document.execCommand('insertText', false, rep); markDirty(); runSpellCheck();
}

/* ════════════════════════════════════════
   INSERT / WRAP HELPERS
════════════════════════════════════════ */
function getPos() { return { s: editor.selectionStart, e: editor.selectionEnd }; }
function setRange(s, e) { editor.selectionStart = s; editor.selectionEnd = e; editor.focus(); }
function ins(text, lineStart) {
  const { s } = getPos();
  if (lineStart) { const val = editor.value, ls = val.lastIndexOf('\n', s - 1) + 1; editor.setSelectionRange(ls, ls); }
  editor.focus(); document.execCommand('insertText', false, text); markDirty(); triggerAutoSave();
}
function wrap(mark) {
  const { s, e } = getPos(), sel = editor.value.slice(s, e) || (isJa ? '文字' : 'text'), rep = mark + sel + mark;
  editor.focus(); document.execCommand('insertText', false, rep); setRange(s + mark.length, s + mark.length + sel.length); markDirty(); triggerAutoSave();
}
function insBlock(before, after) {
  const { s, e } = getPos(), sel = editor.value.slice(s, e), rep = before + sel + after;
  editor.focus(); document.execCommand('insertText', false, rep); setRange(s + before.length, s + before.length + sel.length); markDirty(); triggerAutoSave();
}
function insertLink() {
  const { s, e } = getPos(), sel = editor.value.slice(s, e) || T.insertLink, rep = `[${sel}](URL)`;
  editor.focus(); document.execCommand('insertText', false, rep); setRange(s, s + rep.length); markDirty(); triggerAutoSave();
}
function insertTable() {
  editor.focus(); document.execCommand('insertText', false, T.tableSnippet); markDirty(); triggerAutoSave();
}

/* ════════════════════════════════════════
   FILE OPEN / SAVE / SHARE (Device Optimized)
════════════════════════════════════════ */
let fileHandle = null; // For Desktop File System Access API

function newFile() {
  if (isDirty && editor.value.trim() !== '' && editor.value !== T.defaultMd) {
    if (!confirm(T.confirmNew)) return;
  }
  editor.value = '';
  filenameInput.value = 'untitled.md';
  fileHandle = null;
  update();
  markSaved();
  triggerAutoSave();
  closeMenus();
}

// ── Open Handling ──
async function handleOpen() {
  closeMenus();
  if (!isMobile && window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Markdown / Text', accept: { 'text/plain': ['.md', '.txt', '.markdown'] } }]
      });
      fileHandle = handle;
      const file = await handle.getFile();
      filenameInput.value = file.name;
      
      // 【NFC正規化】読み込みテキストの文字化け・分離バグ防止
      const text = await file.text();
      editor.value = text.normalize('NFC');
      
      update();
      markSaved();
      triggerAutoSave();
      if (spellEnabled) runSpellCheck();
      toast(T.opened(file.name));
    } catch (e) {
      // User canceled or failed, silently abort.
    }
  } else {
    // Fallback for Mobile / Unsupported browsers
    document.getElementById('file-input').click();
  }
}

// Standard file input fallback
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  filenameInput.value = file.name;
  fileHandle = null; // Reset handle since it's a new upload
  const reader = new FileReader();
  reader.onload = ev => {
    let text;
    if (window.Encoding) {
      const uint8 = new Uint8Array(ev.target.result);
      // 【NFC正規化】ここで文字コードを変換しつつ、最後に normalize('NFC') で分離濁点を結合
      text = Encoding.codeToString(Encoding.convert(uint8, { to: 'UNICODE', from: 'AUTO' })).normalize('NFC');
    } else {
      // 【NFC正規化】非対応環境でも、一応NFCをかける
      text = new TextDecoder('utf-8').decode(ev.target.result).normalize('NFC');
    }
    editor.value = text;
    update();
    markSaved();
    triggerAutoSave();
    if (spellEnabled) runSpellCheck();
    toast(T.opened(file.name));
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

// ── Save / Share Handling ──
async function handleSave(isSaveAs = false) {
  closeMenus();
  
  if (isMobile) {
    // 【モバイル】Web Share API
    const filename = filenameInput.value.trim() || 'untitled.md';
    const finalName = /\.(md|txt|markdown)$/i.test(filename) ? filename : filename + '.md';
    // 【BOM無し UTF-8】のファイルとして書き出す
    const file = new File([editor.value], finalName, { type: 'text/markdown;charset=utf-8' });
    
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: finalName,
          text: 'Shared from MD Editor'
        });
        markSaved();
        toast(T.shared);
      } catch (e) {
        console.warn('Share canceled', e);
      }
    } else {
      fallbackDownload();
    }
  } else {
    // 【デスクトップ】File System Access API
    if (window.showSaveFilePicker) {
      try {
        if (!fileHandle || isSaveAs) {
          fileHandle = await window.showSaveFilePicker({
            suggestedName: filenameInput.value.trim() || 'untitled.md',
            types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }]
          });
        }
        const writable = await fileHandle.createWritable();
        // 直接書き込み（BOM無しのUTF-8で保存される）
        await writable.write(editor.value);
        await writable.close();
        filenameInput.value = fileHandle.name;
        markSaved();
        triggerAutoSave();
        toast(T.saved);
      } catch (e) {
        // User canceled
      }
    } else {
      // Fallback for unsupported desktop browsers (Firefox, Safari desktop)
      if (isSaveAs) {
        const newName = prompt(T.promptSaveAs, filenameInput.value.trim() || 'untitled.md');
        if (newName) {
          filenameInput.value = newName;
          fallbackDownload();
        }
      } else {
        fallbackDownload();
      }
    }
  }
}

// 従来のダウンロード保存（フォールバック用：【BOM無し化】完了）
function fallbackDownload() {
  // BOM配列を削除し、純粋なUTF-8として出力
  const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
  let filename = filenameInput.value.trim() || 'untitled.md';
  if (!/\.(md|txt|markdown)$/i.test(filename)) filename += '.md';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  markSaved();
  toast(T.downloaded); // 「ダウンロードしました」に変更
}

/* ════════════════════════════════════════
   KEYBOARD SHORTCUTS
════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  const meta = e.ctrlKey || e.metaKey;
  if (meta && e.key.toLowerCase() === 'n') { e.preventDefault(); newFile(); }
  if (meta && e.shiftKey && e.key.toLowerCase() === 's') { e.preventDefault(); handleSave(true); return; }
  if (meta && !e.shiftKey && e.key.toLowerCase() === 's') { e.preventDefault(); handleSave(false); }
  if (meta && e.key.toLowerCase() === 'o') { e.preventDefault(); handleOpen(); }
  if (meta && e.key.toLowerCase() === 'f') { e.preventDefault(); openSearchPanel('find'); }
  if (meta && e.key.toLowerCase() === 'h') { e.preventDefault(); openSearchPanel('replace'); }
  if (e.key === 'Escape' && srPanelOpen) { e.preventDefault(); closeSearchPanel(); }
});

/* ════════════════════════════════════════
   HTML & PDF EXPORT
════════════════════════════════════════ */
function exportHtml() {
  closeMenus();
  if (!window.marked) return;
  if (!window.DOMPurify) { alert(isJa ? 'セキュリティエラー: DOMPurify が読み込めないため、HTMLエクスポートを中止しました。' : 'Security Error: Export aborted.'); return; }
  const safeHtml = DOMPurify.sanitize(marked.parse(editor.value));
  const title = filenameInput.value.replace(/\.[^/.]+$/, '') || 'document';
  // エクスポートされるHTMLもBOM無しUTF-8
  const fullHtml = `<!DOCTYPE html>\n<html lang="${isJa ? 'ja' : 'en'}">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>${title}</title>\n<style>body{font-family:'Helvetica Neue',Arial,sans-serif;line-height:1.8;color:#333;max-width:800px;margin:0 auto;padding:40px 20px}h1,h2,h3,h4,h5,h6{font-family:sans-serif;font-weight:bold;margin-top:1.5em;margin-bottom:.5em}h1{border-bottom:2px solid #eee;padding-bottom:5px}h2{border-bottom:1px solid #eee;padding-bottom:5px}code{background-color:#f4f4f4;padding:2px 5px;border-radius:4px;font-family:monospace;font-size:.9em}pre{background-color:#f6f8fa;border-radius:6px;padding:16px;overflow-x:auto;border:1px solid #e1e4e8}pre code{background:none;border:none;padding:0}blockquote{border-left:4px solid #dfe2e5;margin:1em 0;padding-left:16px;color:#6a737d}table{border-collapse:collapse;width:100%;margin:1em 0}th,td{border:1px solid #dfe2e5;padding:8px 13px}th{background-color:#f6f8fa;font-weight:600}tr:nth-child(even){background-color:#fcfcfc}img{max-width:100%;height:auto}</style>\n</head>\n<body>\n${safeHtml}\n</body>\n</html>`;
  
  if (isMobile) {
    const file = new File([fullHtml], title + '.html', { type: 'text/html;charset=utf-8' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: title + '.html' }).catch(e=>{});
    } else {
      const b = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = title + '.html'; a.click();
    }
  } else {
    const b = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = title + '.html'; a.click();
    toast(T.downloaded);
  }
}

function exportPdf() {
  closeMenus();
  if (window.marked) {
    if (!window.DOMPurify) { alert(isJa ? 'セキュリティエラー: 印刷を中止しました。' : 'Security Error.'); return; }
    preview.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
  }
  setTimeout(() => window.print(), 100);
}

/* ── TOAST ── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
